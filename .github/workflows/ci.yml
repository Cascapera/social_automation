name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

# Só cancela execuções antigas em PRs (novo commit substitui o anterior).
# Em push para branches, não cancelar: evita "The operation was canceled" no meio do pip/test.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: django-insecure-ci-only-not-for-production
      DJANGO_DEBUG: "1"
      SOCIAL_ENCRYPTION_KEY: test-encryption-key-ci-only
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: python -m ruff check .

      - name: Django system check
        run: python manage.py check --fail-level WARNING

      - name: Pytest and coverage
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
