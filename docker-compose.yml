services:
  redis:
    image: redis:7-alpine
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-social_automation}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-social_automation}"]
      interval: 3s
      timeout: 5s
      retries: 5
    networks:
      - app

  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  # Transcription + analysis (CPU). Runs the next job while celery_render encodes on GPU.
  celery:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app
    command: celery -A config worker -l INFO -P solo -Q transcription

  # FFmpeg / NVENC (finalize, export, burn subs) + default processing (extract_cuts, etc.)
  celery_render:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app
    command: celery -A config worker -l INFO -P solo -Q render,processing

  celery_publish:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app
    command: celery -A config worker -l INFO -P solo -Q publish --heartbeat-interval=300

  beat:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; import sys; cmd = Path('/proc/1/cmdline').read_bytes(); sys.exit(0 if b'celery' in cmd and b'beat' in cmd else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app
    command: celery -A config beat -l INFO

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
