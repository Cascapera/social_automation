services:
  redis:
    image: redis:7-alpine
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-social_automation}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-social_automation}"]
      interval: 3s
      timeout: 5s
      retries: 5
    networks:
      - app

  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc/web
      PROMETHEUS_MULTIPROC_ROOT_DIR: /tmp/prometheus_multiproc
    volumes:
      - .:/app
      - prometheus_multiproc:/tmp/prometheus_multiproc
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app
    # Reset shared multiprocess root once, then create per-service subdirs to avoid PID file collisions across containers.
    command: sh -c "mkdir -p /tmp/prometheus_multiproc && rm -rf /tmp/prometheus_multiproc/* && mkdir -p /tmp/prometheus_multiproc/web /tmp/prometheus_multiproc/celery /tmp/prometheus_multiproc/celery_render /tmp/prometheus_multiproc/celery_publish /tmp/prometheus_multiproc/beat && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  # Transcription + analysis (CPU). Runs the next job while celery_render encodes on GPU.
  celery:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc/celery
    volumes:
      - .:/app
      - prometheus_multiproc:/tmp/prometheus_multiproc
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app
    # Prefork + concurrency 2: parallel transcription jobs (solo = one task at a time).
    command: celery -A config worker -l INFO -Q transcription -c 2

  # FFmpeg / NVENC (finalize, export, burn subs) + default processing (extract_cuts, etc.)
  # GPU: required for h264_nvenc in parallel with CPU transcription (celery has no GPU).
  # Host needs NVIDIA driver + Docker GPU support (Linux: nvidia-container-toolkit;
  # Windows: Docker Desktop + WSL2 GPU enabled). If you have no GPU, remove `gpus` below.
  celery_render:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc/celery_render
    volumes:
      - .:/app
      - prometheus_multiproc:/tmp/prometheus_multiproc
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app
    gpus: all
    command: celery -A config worker -l INFO -P solo -Q render,processing

  celery_publish:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc/celery_publish
    volumes:
      - .:/app
      - prometheus_multiproc:/tmp/prometheus_multiproc
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app
    command: celery -A config worker -l INFO -P solo -Q publish --heartbeat-interval=300

  beat:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-social_automation}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc/beat
    volumes:
      - .:/app
      - prometheus_multiproc:/tmp/prometheus_multiproc
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; import sys; cmd = Path('/proc/1/cmdline').read_bytes(); sys.exit(0 if b'celery' in cmd and b'beat' in cmd else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app
    command: celery -A config beat -l INFO

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      web:
        condition: service_started
    networks:
      - app
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  prometheus_multiproc:
  prometheus_data:
  grafana_data:
