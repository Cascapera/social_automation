services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5
    networks:
      - app

  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  celery:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app
    command: celery -A config worker -l INFO -P solo

  beat:
    build: .
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: django-db
      TZ: America/Sao_Paulo
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; import sys; cmd = Path('/proc/1/cmdline').read_bytes(); sys.exit(0 if b'celery' in cmd and b'beat' in cmd else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app
    command: celery -A config beat -l INFO

networks:
  app:
    driver: bridge
